version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: billsphere_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-billsphere}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: billsphere_redis
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - internal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billsphere_backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-billsphere}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - internal_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: billsphere_frontend
    restart: always
    networks:
      - internal_net

  proxy:
    image: nginx:alpine
    container_name: billsphere_nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-app.example.com}
      - API_DOMAIN=${API_DOMAIN:-api.example.com}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN:-admin.example.com}
    command: /bin/sh -c "envsubst '$${APP_DOMAIN} $${API_DOMAIN} $${ADMIN_DOMAIN}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - backend
    networks:
      - internal_net

  certbot:
    image: certbot/certbot
    container_name: billsphere_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal_net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: billsphere_backup
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-billsphere}
    volumes:
      - backup_data:/docker/backups
    depends_on:
      - db
    networks:
      - internal_net

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_conf:
  backup_data:

networks:
  internal_net:
    driver: bridge
