services:
  - type: web
    name: billsphere-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: billsphere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: OPENROUTER_API_KEY
        sync: false
        
databases:
  - name: billsphere-db
    plan: free
    databaseName: billsphere
    user: billsphere
